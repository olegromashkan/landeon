name: Import Landeon

on:
  push:
    paths:
      - .github/workflows/import-landeon.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download project archive
        run: |
          curl -L -o /tmp/landeon-publish.tgz https://tmpfiles.org/dl/wdwwwRgtFY6w/landeon-publish.tgz
          echo "d7924c3d3f174b52a01a36cf79a7dd00a9cb8215f1895e4b44ccc9ff6f1e683f  /tmp/landeon-publish.tgz" | sha256sum -c -
      - name: Replace repository contents
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          tar -xzf /tmp/landeon-publish.tgz -C .
          rm -rf .github/workflows/import-landeon.yml .codex-write-test
      - name: Commit imported project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initial public release"
          git push origin main
